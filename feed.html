  <!-- =============================================
       CONTENEDOR PRINCIPAL — SPA móvil
       ============================================= -->

       <script>
        // Esta función envía los datos del cliente potencial en segundo plano
        async function enviarNuevoLead(nombre, email, notas = "Nuevo cliente potencial") {
          const data = {
            access_key: "aac109e6-8b0b-486d-a6bc-c66aa2c10f8e",
            name: nombre,
            email: email,
            message: notas
          };
      
          try {
            const response = await fetch("https://api.web3forms.com/submit", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
              },
              body: JSON.stringify(data)
            });
      
            const result = await response.json();
            if (result.success) {
              console.log("Lead guardado correctamente en Web3Forms.");
            }
          } catch (error) {
            console.error("Error al enviar los datos:", error);
          }
        }
      </script>
  <div class="app" id="app">
